# ==============================================================
# Jerney - DevSecOps CI/CD Pipeline (CORRECTED)
# ==============================================================
# Flow: Lint -> SCA -> Build+Scan+Push -> IaC Scan -> Deploy Manifest Update
#
# Key change from the original: image scanning now happens BEFORE the image
# is pushed (previously it happened after, in a separate job that rebuilt
# a different, untagged copy of the image). See the companion README for
# the full list of fixes and why each one matters.
# ==============================================================

name: my DevSecOps Pipeline

on:
  push:
    branches: ["main"]
    # FIXED: was branches: ["*"] — building, pushing images, and updating the
    # deployment manifest on every single branch is very unlikely to be intended.
    # Change this back to ["*"] only if you deliberately want that behavior,
    # and if so, also revisit item (2) below.
  pull_request:
    branches: ["main"]
    # Pull requests still run lint/sca/build(local-only)/scan/iac-scan for
    # early feedback — they just never push images or touch the manifest.

# Security: restrict default permissions to read-only; individual jobs
# elevate only the specific permission they actually need.
permissions:
  contents: read

# Prevents overlapping runs on the same branch from racing to push
# conflicting commits to the Kubernetes manifest.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  DOCKER_REGISTRY: ghcr.io
  # FIXED: BACKEND_IMAGE/FRONTEND_IMAGE now reference ${{ env.DOCKER_REGISTRY }}
  # instead of hardcoding "ghcr.io" a second time — one place to change the
  # registry in future, not three.
  BACKEND_IMAGE: ${{ env.DOCKER_REGISTRY }}/${{ github.repository }}/jerney-backend
  FRONTEND_IMAGE: ${{ env.DOCKER_REGISTRY }}/${{ github.repository }}/jerney-frontend

jobs:
  # ==============================================================
  # STAGE 1: Linting
  # ==============================================================
  lint:
    name: "🔍 Lint Code"
    runs-on: ubuntu-latest
    # continue-on-error left TRUE here deliberately — style/lint issues are
    # lower stakes than a security finding. Revisit if you want this to
    # block merges too.
    continue-on-error: true
    strategy:
      matrix:
        component: [backend, frontend]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "${{ matrix.component }}/package-lock.json"

      - name: Install dependencies
        working-directory: ${{ matrix.component }}
        run: npm ci

      - name: Run ESLint
        working-directory: ${{ matrix.component }}
        run: npm run lint

  # ==============================================================
  # STAGE 2: Software Composition Analysis (SCA) — Dependency Audit
  # ==============================================================
  sca:
    name: "🛡️ Dependency Audit"
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        component: [backend, frontend]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "${{ matrix.component }}/package-lock.json"

      - name: Install dependencies
        working-directory: ${{ matrix.component }}
        run: npm ci

      - name: npm audit
        working-directory: ${{ matrix.component }}
        # FIXED: removed "|| true". A real high/critical vulnerability now
        # actually fails this job instead of being silently ignored.
        # If you genuinely want this advisory-only for now, use
        # "continue-on-error: true" on the STEP (visible in the UI as a
        # warning) rather than swallowing the exit code entirely.
        run: npm audit --audit-level=high

  # ==============================================================
  # STAGE 3: Build, Scan, and Push Container Images (COMBINED)
  # ==============================================================
  # FIXED: previously "build" (which pushed immediately) and "image-scan"
  # (which scanned a completely different, separately-built image afterward)
  # were two separate jobs. They're now one job, in the correct order:
  #   1. Build locally only (push: false)
  #   2. Scan that exact local image
  #   3. Push that exact same image ONLY if the scan passes and it's not a PR
  # This guarantees the scanned image and the shipped image are identical,
  # and guarantees nothing vulnerable reaches the registry.
  # ==============================================================
  build-scan-push:
    name: "🐳 Build, Scan & Push ${{ matrix.component }}"
    runs-on: ubuntu-latest
    needs: sca
    permissions:
      contents: read
      packages: write # needed to push to GHCR
    strategy:
      matrix:
        component: [backend, frontend]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_REGISTRY }}/${{ github.repository }}/jerney-${{ matrix.component }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build image locally (NOT pushed yet)
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.component }}
          file: ./${{ matrix.component }}/Dockerfile
          push: false        # never push before scanning
          load: true          # load the image into the local Docker daemon so Trivy can scan it
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scanner
        # FIXED: pinned to a released version instead of the floating "@master" branch.
        uses: aquasecurity/trivy-action@0.28.0
        with:
          # Scans the short-SHA tag, which was just built above — the exact
          # same image that will be pushed in the next step, not a rebuild.
          image-ref: "${{ env.DOCKER_REGISTRY }}/${{ github.repository }}/jerney-${{ matrix.component }}:${{ github.sha }}"
          format: "table"
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: "os,library"
          severity: "CRITICAL,HIGH"
          timeout: "10m"
        # FIXED: removed "continue-on-error: true" from this job — a failing
        # scan now actually stops the pipeline before any push happens.

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push the already-scanned image
        if: github.event_name == 'push'
        run: |
          # Push every tag docker/metadata-action generated for this image.
          # Since the image was already built and loaded locally above with
          # these exact tags, this pushes precisely what was scanned.
          echo "${{ steps.meta.outputs.tags }}" | while read -r tag; do
            if [ -n "$tag" ]; then
              echo "Pushing $tag"
              docker push "$tag"
            fi
          done

  # ==============================================================
  # STAGE 4: IaC Security Scan (Checkov) — Terraform + K8s
  # ==============================================================
  iac-scan:
    name: "🏗️ IaC Security Scan"
    runs-on: ubuntu-latest
    needs: lint
    # FIXED: removed "continue-on-error: true" — an insecure Terraform
    # configuration should actually block the pipeline, matching the fact
    # that "soft_fail: false" was already set below for the Terraform check.
    # (If you want IaC scanning to stay advisory-only for now while your
    # team builds up a clean baseline, re-add continue-on-error deliberately
    # and note it in your README, rather than leaving it as an accident.)
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Checkov on Terraform
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: terraform/
          framework: terraform
          soft_fail: false
          # NOTE: these two skipped checks (public EKS endpoint) are a
          # deliberate, reviewed exception for a dev environment. If this
          # same workflow file is ever reused for a production deployment
          # path, revisit whether this skip is still appropriate — it is
          # NOT automatically scoped to "dev" branches/environments only.
          skip_check: CKV_AWS_39,CKV_AWS_58
          output_format: cli

      - name: Run Checkov on Kubernetes manifests
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: k8s/
          framework: kubernetes
          soft_fail: true  # left soft — many checks don't cleanly apply to raw manifests
          output_format: cli

  # ==============================================================
  # STAGE 5: Dockerfile Lint (Hadolint)
  # ==============================================================
  dockerfile-lint:
    name: "📋 Dockerfile Lint"
    runs-on: ubuntu-latest
    continue-on-error: true   # style-only; left advisory deliberately
    strategy:
      matrix:
        component: [backend, frontend]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: ${{ matrix.component }}/Dockerfile
          failure-threshold: warning

  # ==============================================================
  # STAGE 6: Update K8s Manifest with New Image Tag
  # Only runs on push to main, and only after every gating stage passes.
  # ==============================================================
  update-manifest:
    name: "🚀 Update K8s Manifest"
    runs-on: ubuntu-latest
    # FIXED: this job previously had NO "needs:" at all, meaning it ran in
    # parallel with (or even before) build/scan/iac-scan finished — so the
    # manifest could be updated to point at an image that hadn't been built
    # yet, or that later failed its security scan. It now explicitly waits
    # for every gating stage.
    needs: [build-scan-push, iac-scan, dockerfile-lint]
    # FIXED: added the branch check — this job now only runs on a genuine
    # push to main, matching the trigger restriction above.
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write # needed to push manifest changes
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Update K8s manifest with new image tags
        run: |
          set -euo pipefail
          IMAGE_TAG="${{ github.sha }}"
          # NOTE: this now matches the FULL sha used to scan/push the image
          # above, not a separately-recomputed short sha — the two no longer
          # risk drifting out of sync with each other.

          # FIXED: the original used raw line-number sed with a hardcoded
          # 10-space indent, and no check that the line was actually found.
          # This version validates both before touching the file.
          BACKEND_LINE=$(awk '/- name: backend/{found=1} found && /image:/{print NR; exit}' k8s/jerney.yaml)
          FRONTEND_LINE=$(awk '/- name: frontend/{found=1} found && /image:/{print NR; exit}' k8s/jerney.yaml)

          if [ -z "$BACKEND_LINE" ] || [ -z "$FRONTEND_LINE" ]; then
            echo "ERROR: could not locate image: lines in k8s/jerney.yaml — aborting to avoid corrupting the file."
            exit 1
          fi

          # Preserve the original line's leading whitespace instead of
          # hardcoding 10 spaces, so this still works if indentation ever changes.
          BACKEND_INDENT=$(sed -n "${BACKEND_LINE}p" k8s/jerney.yaml | sed -E 's/^([[:space:]]*).*/\1/')
          FRONTEND_INDENT=$(sed -n "${FRONTEND_LINE}p" k8s/jerney.yaml | sed -E 's/^([[:space:]]*).*/\1/')

          sed -i "${BACKEND_LINE}s|.*|${BACKEND_INDENT}image: ${BACKEND_IMAGE}:${IMAGE_TAG}|" k8s/jerney.yaml
          sed -i "${FRONTEND_LINE}s|.*|${FRONTEND_INDENT}image: ${FRONTEND_IMAGE}:${IMAGE_TAG}|" k8s/jerney.yaml

          echo "✅ Updated images to tag: ${IMAGE_TAG}"
          grep -n "image:" k8s/jerney.yaml

      - name: Commit and push manifest update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/jerney.yaml
          git diff --cached --quiet || git commit -m "ci: update k8s images to ${{ steps.sha.outputs.short }} [skip ci]"
          git push
